<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Deluxe CRM — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--gold:#D4A843;--bg:#080810;--bg2:#0D0D1A;--border:#1E1E35;--text:#E8E4F0;--text2:#A09BB8;--red:#FF4F6A;--green:#22C986;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(212,168,67,.08),transparent 70%);pointer-events:none;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:400px;position:relative;z-index:1;}
.logo{text-align:center;margin-bottom:32px;}
.logo-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--gold),#92400E);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px;box-shadow:0 0 30px rgba(212,168,67,.3);}
.logo-name{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);}
.logo-sub{font-size:12px;color:var(--text2);margin-top:4px;}
label{display:block;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;margin-top:18px;}
input{width:100%;background:#12121F;border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;}
input:focus{border-color:var(--gold);}
.btn{width:100%;background:var(--gold);color:#080810;border:none;border-radius:8px;padding:13px;font-weight:700;font-size:15px;cursor:pointer;margin-top:24px;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn:hover{background:#F0C060;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.err{background:rgba(255,79,106,.1);border:1px solid rgba(255,79,106,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-top:14px;display:none;}
.err.show{display:block;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(8,8,16,.3);border-top-color:#080810;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
.hint{font-size:12px;color:var(--text2);text-align:center;margin-top:20px;line-height:1.6;}
.hint a{color:var(--gold);cursor:pointer;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🏠</div>
    <div class="logo-name">Royal Deluxe CRM</div>
    <div class="logo-sub">Sistema Comercial de Construção Civil</div>
  </div>
  <label>E-mail</label>
  <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
  <label>Senha</label>
  <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
    onkeydown="if(event.key==='Enter')doLogin()">
  <button class="btn" id="login-btn" onclick="doLogin()">Entrar</button>
  <div class="err" id="login-err"></div>
  <div class="hint">Novo aqui? Fale com o administrador da conta.<br>
    <a onclick="showForgot()">Esqueci minha senha</a>
  </div>
</div>

<script>
const SUPABASE_URL = "https://rmzvsxwdtqcwwhnpukwj.supabase.co";
const SUPABASE_KEY = "sb_publishable_LJJlqIRjzSyk8ivFjqpXvQ_Ghh24Kwg";
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

_sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = "index.html";
});

async function doLogin() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const btn = document.getElementById("login-btn");
  const err = document.getElementById("login-err");
  err.classList.remove("show");

  if (!email || !password) {
    err.textContent = "Preencha e-mail e senha.";
    err.classList.add("show");
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Entrando...';

  const { error } = await _sb.auth.signInWithPassword({ email, password });

  if (error) {
    err.textContent = error.message === "Invalid login credentials"
      ? "E-mail ou senha incorretos."
      : error.message;
    err.classList.add("show");
    btn.disabled = false;
    btn.textContent = "Entrar";
    return;
  }

  window.location.href = "index.html";
}

async function showForgot() {
  const email = document.getElementById("email").value.trim();
  if (!email) { alert("Digite seu e-mail primeiro."); return; }
  await _sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + "/reset.html" });
  alert("Se esse e-mail existir, você receberá o link de recuperação.");
}
</script>
</body>
</html>
